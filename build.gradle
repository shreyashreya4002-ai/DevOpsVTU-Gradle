plugins {
    id 'application'
}

repositories {
    mavenCentral()
}

dependencies {
    testImplementation 'org.seleniumhq.selenium:selenium-java:4.31.0'
    testImplementation 'org.testng:testng:7.11.0'

}
test{
    useTestNG()
}
application {
    mainClass = 'org.example.Main'
}
jar {
    manifest {
        attributes(
                'Main-Class': 'org.example.Main'
        )
    }
}

